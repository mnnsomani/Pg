<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — Odyssey</title>
  <meta name="description" content="Sign in to your Odyssey account to find and manage your PG in Jaipur." />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    /* ── PAGE LAYOUT ─────────────────────────────── */
    html, body { height: 100%; }
    body { display: flex; flex-direction: column; background: var(--bg); }

    .auth-wrapper {
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: 100vh;
    }

    /* ── LEFT PANEL ──────────────────────────────── */
    .auth-left {
      position: relative;
      overflow: hidden;
      background: var(--text);
    }
    .auth-left-bg {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover; opacity: 0.35;
    }
    .auth-left-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(160deg, rgba(10,10,10,0.5) 0%, rgba(30,15,5,0.85) 100%);
    }
    .auth-left-content {
      position: relative; z-index: 1;
      height: 100%; display: flex; flex-direction: column;
      padding: 40px 48px;
    }
    .auth-brand {
      display: flex; align-items: center; gap: 8px;
      text-decoration: none; color: #fff;
      font-size: 18px; font-weight: 700; letter-spacing: -0.3px;
    }
    .auth-brand-dot { width: 7px; height: 7px; background: var(--accent); border-radius: 50%; }

    .auth-left-body {
      flex: 1; display: flex; flex-direction: column;
      justify-content: flex-end; padding-bottom: 56px;
    }
    .auth-eyebrow {
      font-size: 11px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 2px; color: var(--accent); margin-bottom: 18px;
    }
    .auth-left-body h2 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(26px, 3vw, 40px); font-weight: 700;
      color: #fff; line-height: 1.25; margin-bottom: 16px;
    }
    .auth-left-body p {
      font-size: 14px; color: rgba(255,255,255,0.6);
      line-height: 1.75; max-width: 320px; margin-bottom: 36px;
    }
    .auth-stats {
      display: flex; gap: 32px;
    }
    .auth-stat b {
      display: block; font-size: 22px; font-weight: 700; color: #fff;
      letter-spacing: -0.5px;
    }
    .auth-stat span { font-size: 12px; color: rgba(255,255,255,0.5); }

    /* Testimonial card */
    .auth-testimonial {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px; padding: 20px 22px;
      margin-bottom: 32px; max-width: 380px;
    }
    .auth-testimonial p {
      font-size: 14px; color: rgba(255,255,255,0.8);
      font-style: italic; line-height: 1.7; margin-bottom: 14px;
    }
    .auth-testimonial .t-author { display: flex; align-items: center; gap: 10px; }
    .auth-testimonial .t-av {
      width: 34px; height: 34px; border-radius: 50%;
      background: var(--accent); display: flex; align-items: center;
      justify-content: center; font-size: 14px; font-weight: 700; color: #fff;
    }
    .auth-testimonial strong { font-size: 13px; color: #fff; display: block; }
    .auth-testimonial small { font-size: 11px; color: rgba(255,255,255,0.5); }

    /* ── RIGHT PANEL ─────────────────────────────── */
    .auth-right {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 48px 56px;
      background: var(--bg);
    }
    .auth-form-wrap { width: 100%; max-width: 400px; }

    /* Tabs */
    .auth-tabs {
      display: flex; background: var(--bg2);
      border: 1px solid var(--border); border-radius: 10px;
      padding: 4px; margin-bottom: 36px;
    }
    .auth-tab {
      flex: 1; padding: 9px; border: none; background: none;
      font: 500 14px 'Inter', sans-serif; cursor: pointer;
      border-radius: 7px; color: var(--muted); transition: var(--trans);
    }
    .auth-tab.active {
      background: var(--card); color: var(--text);
      box-shadow: 0 1px 6px rgba(0,0,0,0.08);
    }

    /* Form header */
    .auth-form-header { margin-bottom: 28px; }
    .auth-form-header h1 {
      font-size: 24px; font-weight: 700; color: var(--text);
      letter-spacing: -0.5px; margin-bottom: 6px;
    }
    .auth-form-header p { font-size: 14px; color: var(--muted); }

    /* Fields */
    .field { margin-bottom: 18px; }
    .field label {
      display: block; font-size: 13px; font-weight: 500;
      color: var(--text2); margin-bottom: 7px;
    }
    .field input {
      width: 100%; background: var(--bg2); border: 1.5px solid var(--border);
      border-radius: 8px; padding: 12px 14px;
      font: 14px 'Inter', sans-serif; color: var(--text);
      outline: none; transition: var(--trans);
    }
    .field input:focus {
      border-color: var(--accent); background: #fff;
      box-shadow: 0 0 0 3px rgba(196,146,106,0.12);
    }
    .field input::placeholder { color: var(--dim); }

    /* Password field with toggle */
    .pw-wrap { position: relative; }
    .pw-wrap input { padding-right: 44px; }
    .pw-toggle {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      font-size: 15px; color: var(--muted); padding: 4px;
    }
    .pw-toggle:hover { color: var(--text); }

    /* Row: Remember + Forgot */
    .field-row {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 24px;
    }
    .remember { display: flex; align-items: center; gap: 8px; cursor: pointer; }
    .remember input[type="checkbox"] { accent-color: var(--accent); width: 15px; height: 15px; }
    .remember span { font-size: 13px; color: var(--text2); }
    .forgot { font-size: 13px; color: var(--accent); text-decoration: none; font-weight: 500; }
    .forgot:hover { color: var(--accent-dark); }

    /* Submit */
    .btn-auth {
      width: 100%; padding: 13px; border: none; border-radius: 8px;
      background: var(--text); color: #fff;
      font: 600 14px 'Inter', sans-serif; cursor: pointer;
      transition: var(--trans); margin-bottom: 20px;
    }
    .btn-auth:hover { background: #333; transform: translateY(-1px); box-shadow: 0 4px 14px rgba(0,0,0,0.15); }
    .btn-auth:active { transform: translateY(0); }

    /* Divider */
    .or-divider {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 20px; color: var(--dim); font-size: 12px;
    }
    .or-divider::before, .or-divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }

    /* Social buttons */
    .social-btns { display: flex; gap: 10px; margin-bottom: 28px; }
    .btn-social {
      flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px;
      padding: 10px; border: 1.5px solid var(--border); border-radius: 8px;
      background: none; cursor: pointer; font: 500 13px 'Inter', sans-serif;
      color: var(--text2); transition: var(--trans);
    }
    .btn-social:hover { border-color: var(--text2); background: var(--bg2); color: var(--text); }
    .btn-social svg { width: 16px; height: 16px; flex-shrink: 0; }

    /* Switch */
    .auth-switch {
      text-align: center; font-size: 13px; color: var(--muted);
    }
    .auth-switch a { color: var(--accent); font-weight: 600; text-decoration: none; }
    .auth-switch a:hover { color: var(--accent-dark); }

    /* Signup-only fields (hidden by default) */
    .signup-only { display: none; }
    .signup-only.visible { display: block; }

    /* ── RESPONSIVE ───────────────────────────────── */
    @media(max-width: 768px) {
      .auth-wrapper { grid-template-columns: 1fr; }
      .auth-left { display: none; }
      .auth-right { padding: 40px 28px; justify-content: flex-start; padding-top: 60px; }
    }
  </style>
</head>
<body>

  <div class="auth-wrapper">

    <!-- LEFT: Branding panel -->
    <div class="auth-left">
      <img src="jaipur_city.png" alt="Jaipur" class="auth-left-bg" />
      <div class="auth-left-overlay"></div>
      <div class="auth-left-content">
        <a href="index.html" class="auth-brand">
          <span class="auth-brand-dot"></span> Odyssey
        </a>

        <div class="auth-left-body">
          <h2>Your home in<br />Jaipur, found.</h2>
          <p>Join thousands of students and professionals who found their perfect PG — zero brokerage, zero hassle.</p>


        </div>
      </div>
    </div>

    <!-- RIGHT: Form panel -->
    <div class="auth-right">
      <div class="auth-form-wrap">

        <!-- Tabs -->
        <div class="auth-tabs">
          <button class="auth-tab active" id="tab-signin" onclick="switchTab('signin')">Sign In</button>
          <button class="auth-tab" id="tab-signup" onclick="switchTab('signup')">Create Account</button>
        </div>

        <!-- Form header -->
        <div class="auth-form-header">
          <h1 id="form-title">Welcome back</h1>
          <p id="form-sub">Sign in to your Odyssey account.</p>
        </div>

        <form id="auth-form" onsubmit="handleSubmit(event)" novalidate>

          <!-- Sign-up only: Name -->
          <div class="field signup-only" id="field-name">
            <label for="name">Full Name</label>
            <input type="text" id="name" placeholder="Priya Sharma" />
          </div>

          <!-- Email -->
          <div class="field">
            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="you@email.com" required />
          </div>

          <!-- Password -->
          <div class="field">
            <label for="password">Password</label>
            <div class="pw-wrap">
              <input type="password" id="password" placeholder="Enter your password" required />
              <button type="button" class="pw-toggle" id="pw-toggle" onclick="togglePw()" title="Show/hide password">👁</button>
            </div>
          </div>

          <!-- Sign-up only: Confirm Password -->
          <div class="field signup-only" id="field-confirm">
            <label for="confirm">Confirm Password</label>
            <div class="pw-wrap">
              <input type="password" id="confirm" placeholder="Re-enter your password" />
              <button type="button" class="pw-toggle" onclick="toggleConfirm()" title="Show/hide password">👁</button>
            </div>
          </div>

          <!-- Remember / Forgot (sign-in only) -->
          <div class="field-row" id="row-remember">
            <label class="remember">
              <input type="checkbox" id="remember" />
              <span>Remember me</span>
            </label>
            <a href="#" class="forgot" onclick="forgotPw(event)">Forgot password?</a>
          </div>

          <button type="submit" class="btn-auth" id="submit-btn">Sign In</button>


          <p class="auth-switch" id="auth-switch-text">
            Don't have an account? <a href="#" onclick="switchTab('signup'); return false;">Create one free →</a>
          </p>

        </form>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script>
    // If already signed in, skip the sign-in page
    if (localStorage.getItem('odyssey_user')) {
      window.location.href = 'index.html';
    }

    const API = window.location.origin;
    let mode = 'signin';

    function switchTab(to) {
      mode = to;
      // Tab styles
      document.getElementById('tab-signin').classList.toggle('active', to === 'signin');
      document.getElementById('tab-signup').classList.toggle('active', to === 'signup');

      const isSignup = to === 'signup';

      // Show/hide signup-only fields
      document.querySelectorAll('.signup-only').forEach(el => el.classList.toggle('visible', isSignup));

      // Row remember + forgot — hide on signup
      document.getElementById('row-remember').style.display = isSignup ? 'none' : 'flex';

      // Header text
      document.getElementById('form-title').textContent = isSignup ? 'Create an account' : 'Welcome back';
      document.getElementById('form-sub').textContent   = isSignup ? 'Join Odyssey for free — no brokerage, ever.' : 'Sign in to your Odyssey account.';

      // Button text
      document.getElementById('submit-btn').textContent = isSignup ? 'Create Account' : 'Sign In';

      // Switch link
      document.getElementById('auth-switch-text').innerHTML = isSignup
        ? 'Already have an account? <a href="#" onclick="switchTab(\'signin\'); return false;">Sign in →</a>'
        : 'Don\'t have an account? <a href="#" onclick="switchTab(\'signup\'); return false;">Create one free →</a>';
    }

    function togglePw() {
      const inp = document.getElementById('password');
      const btn = document.getElementById('pw-toggle');
      const show = inp.type === 'password';
      inp.type = show ? 'text' : 'password';
      btn.textContent = show ? '🙈' : '👁';
    }

    function toggleConfirm() {
      const inp = document.getElementById('confirm');
      inp.type = inp.type === 'password' ? 'text' : 'password';
    }

    async function handleSubmit(e) {
      e.preventDefault();
      const btn      = document.getElementById('submit-btn');
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !password) { showToast('⚠️ Please fill in all fields.'); return; }

      if (mode === 'signup') {
        const name    = document.getElementById('name').value.trim();
        const confirm = document.getElementById('confirm').value;
        if (!name)                { showToast('⚠️ Please enter your name.'); return; }
        if (password !== confirm)  { showToast('⚠️ Passwords do not match.'); return; }
        if (password.length < 6)   { showToast('⚠️ Password must be at least 6 characters.'); return; }
      }

      btn.textContent = mode === 'signin' ? 'Signing in...' : 'Creating account...';
      btn.disabled = true;
      btn.style.opacity = '0.7';

      try {
        const endpoint = mode === 'signin' ? '/api/signin' : '/api/signup';
        const body     = mode === 'signin'
          ? { email, password }
          : { name: document.getElementById('name').value.trim(), email, password };

        const res  = await fetch(API + endpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        const data = await res.json();

        if (!res.ok) throw new Error(data.error || 'Something went wrong.');

        localStorage.setItem('odyssey_user', JSON.stringify(data.user));
        showToast(mode === 'signin' ? '✅ Signed in! Taking you home...' : '🎉 Account created! Welcome to Odyssey.');
        setTimeout(() => window.location.href = 'index.html', 1000);

      } catch (err) {
        showToast('❌ ' + err.message);
        btn.textContent = mode === 'signin' ? 'Sign In' : 'Create Account';
        btn.disabled = false;
        btn.style.opacity = '1';
      }
    }

    function forgotPw(e) {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      if (!email) { showToast('📧 Enter your email above first.'); return; }
      showToast('📬 Password reset coming soon — contact hello@odyssey.in');
    }

    function socialLogin(provider) {
      showToast(`🔗 ${provider} login coming soon!`);
    }

    function showToast(msg, ms = 3500) {
      const el = document.getElementById('toast');
      el.textContent = msg; el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), ms);
    }
  </script>
</body>
</html>
